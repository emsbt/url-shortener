version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      BASE_URL: "http://localhost:8080"
      API_KEY: "default-api-key"
      DB_PATH: "/app/data/urls.db"
      LOG_LEVEL: "info"
    volumes:
      - url_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  url_data:
    driver: local
